name: US stock report

on:
 # schedule:
   # - cron: '47 22 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-event]

jobs:
  build:
    runs-on: ubuntu-latest
    # added this make sure bot push 
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip uninstall google-generativeai google-genai anthropic -y || true
          pip install -r requirements.txt

      - name: Run Stock Bot and Notify
        env:
          AI_KEY: ${{ secrets.AI_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python bot_stock.py
          python discord_notify.py
        continue-on-error: true

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add daily_stock_report.txt
          # Thêm ngày giờ vào commit message để Git luôn thấy sự khác biệt
          git commit -m "daily: market update $(date +'%Y-%m-%d %H:%M:%S') [skip ci]" || echo "No changes"
          git push
