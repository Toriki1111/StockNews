name: Daily Auto Commit

on:
  schedule:
    # Chạy vào 00:00 UTC mỗi ngày (khoảng 7:00 sáng giờ Việt Nam)
    - cron: '0 0 * * *'
  workflow_dispatch: # Cho phép bạn bấm nút chạy thử thủ công

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update file
        run: |
          echo "Last update: $(date)" > autocommit.txt

      - name: Commit and Push
        run: |
          git config --global user.name "Toriki1111"
          git config --global user.email "tranhungphu105@gmail.com"
          git add autocommit.txt
          git commit -m "chore: daily auto commit [skip ci]" || echo "No changes to commit"
          git push