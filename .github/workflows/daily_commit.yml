name: Daily Stock Bot

on:
  schedule:
    - cron: '8 3 * * *' # 7h sáng VN
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot script
        run: python bot_stock.py

      - name: Commit and Push
        run: |
          git config --global user.name "Toriki1111"
          git config --global user.email "tranhungphu105@gmail.com"
          git add .
          git commit -m "update: daily stock log [skip ci]" || echo "No changes"
          git push
