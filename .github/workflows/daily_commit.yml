name: Daily Stock Bot US

on:
  schedule:
    # Chạy vào 00:00 UTC (07:00 sáng VN) mỗi ngày
    - cron: '0 0 * * *'
  workflow_dispatch: # Nút bấm chạy thủ công để test

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Cài đặt yfinance để lấy dữ liệu chứng khoán Mỹ
          pip install requests yfinance pandas

      - name: Run bot script
        run: python bot_stock.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add autocommit.txt
          # Chỉ commit nếu có thay đổi để tránh lỗi
          git commit -m "daily: update US oil stocks log [skip ci]" || echo "No changes to commit"
          git push
