name: Daily Stock Bot

on:
  schedule:
    # Chạy vào 00:00 UTC (07:00 sáng VN) mỗi ngày
    - cron: '0 0 * * *'
  workflow_dispatch: # Cho phép bấm nút chạy tay để test

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Cài vnstock (mới) và ipython để tránh lỗi hiển thị của thư viện
          pip install requests vnstock pandas ipython

      - name: Run bot script
        run: python bot_stock.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add autocommit.txt
          # Commit nếu có thay đổi, tránh lỗi khi file ko đổi
          git commit -m "daily: update stock log [skip ci]" || echo "No changes to commit"
          git push
