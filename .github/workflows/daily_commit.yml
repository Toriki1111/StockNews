name: Daily Multi-Sector Bot

on:
  schedule:
    # 22:47 UTC tương đương 05:47 AM giờ Việt Nam
    # Chạy tất cả các ngày trong tuần (0-6) để giữ GitHub luôn xanh
    - cron: '47 22 * * *'
  workflow_dispatch: # Vẫn giữ nút này để bạn có thể bấm chạy tay bất cứ lúc nào
  repository_dispatch:
    types: [trigger-event]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance pandas

      - name: Run bot script
        run: python bot_stock.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add autocommit.txt
          # Commit ngay cả khi dữ liệu cũ để duy trì đóng góp (Contribution)
          git commit -m "daily: market update log [skip ci]" || echo "No changes"
          git push
